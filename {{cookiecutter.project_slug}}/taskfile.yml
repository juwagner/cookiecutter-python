# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - task --list

  init-git-repo:
    cmds:
      - git init
    status:
      - test -d .git
    internal: true

  create-env-file:
    cmds:
      - cp .env.example .env
    status:
      - test -f .env
    internal: true

  install-pre-commit:
    cmds:
      - uv tool install pre-commit
      - uv tool run pre-commit install
    status:
      - test -f .git/hooks/pre-commit
    internal: true

  setup:
    cmds:
      - task: init-git-repo
      - task: create-env-file
      - task: install-pre-commit
      - uv sync --all-groups
    desc: Setup development environment

  lint:
    cmds:
      - uv tool run pre-commit run --all-files
    desc: Run linters on all files

  format:
    cmds:
      - uv run ruff check --fix src tests
      - uv run ruff format src tests
    desc: Format and fix Python code

  check:
    cmds:
      - uv run ruff check src tests
    desc: Check code without fixing (for CI)

  test:
    cmds:
      - uv run pytest
    desc: Run tests
