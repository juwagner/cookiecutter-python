version: "3"

tasks:
  default:
    cmds:
      - task --list

  init-git-repo:
    cmds:
      - git init
    status:
      - test -d .git
    internal: true

  create-env-file:
    cmds:
      - cp .env.example .env
    status:
      - test -f .env
    internal: true

  install-pre-commit:
    cmds:
      - uv tool install pre-commit
      - uv tool run pre-commit install
    status:
      - test -f .git/hooks/pre-commit
    internal: true

  setup:
    cmds:
      - task: init-git-repo
      - task: create-env-file
      - task: install-pre-commit
      - uv sync --all-groups --all-extras
    desc: Setup development environment

  lint:
    cmds:
      - uv tool run pre-commit run --all-files
    desc: Run linters and formatters on all files

  test:
    cmds:
      - uv run pytest
    desc: Run pytest tests
